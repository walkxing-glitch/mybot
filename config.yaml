model:
  default: "deepseek/deepseek-chat"
  fallback: null

api_keys:
  # 实际 key 在 .env 里，这里只定义变量名映射
  anthropic: "${ANTHROPIC_API_KEY}"
  openai: "${OPENAI_API_KEY}"
  doubao: "${DOUBAO_API_KEY}"
  deepseek: "${DEEPSEEK_API_KEY}"

tools:
  enabled:
    - shell
    - code
    - web_search
    - web_fetch
    - ontology
    - neural_twin
    - calendar
    - memory
  shell:
    allowed_commands: [ls, cat, grep, find, python, git, pip, uv, docker]
    timeout: 30
  code:
    workspace_dirs:
      - /Users/ddn/Developer
  ontology:
    # 对接 myontology/ontology-engine（本机 :8003，已在前台 python 跑着）
    # ontology-platform 已于 2026-04-16 停止开发，不再对接
    api_url: "http://localhost:8003"
    ontology_id: "362a5ce1-29ca-4b4b-8bd0-29c122435bd3"  # "邢智强 2025"

memory:
  decay:
    default_half_life_days: 30
    fact_half_life_days: 180
    preference_half_life_days: 365
  consolidation_interval: 10  # 每 N 次对话触发整理

gateway:
  telegram:
    token: "${TELEGRAM_BOT_TOKEN}"
    polling_mode: true

# 丽泽园记忆系统（mybot/palace）
# See docs/superpowers/specs/2026-04-16-mybot-memory-palace-design.md
palace:
  enabled: true  # false → 回退到 legacy MemoryEngine
  db_path: data/palace.db
  current_year_scope: 3
  embedder: BAAI/bge-m3
  embedder_dim: 1024
  reranker: BAAI/bge-reranker-v2-m3
  top_k_south: 5
  top_k_fact: 3

rooms:
  fixed:
    1: 消费
    2: 工作
    3: 人际
    4: 健康
    5: 学习
    6: 技术
    7: 项目
    8: 家庭
    9: 出行
    10: 情绪
  misc_room: 20

atrium_guards:
  blacklist_patterns:
    - "不可用"
    - "未能找到"
    - "服务中断"
    - "超时"
    - "工具报错"
    - "无法访问"
    - "操作失败"
    - "连接失败"
  evidence_threshold: 3
  evidence_days_span: 2
  require_manual_approve: true
  review_cycle_days: 30
  stale_archive_days: 90
